<div class="card">
  <div class="card-header border-0 pt-6">
    <div class="card-title">
      <div class="d-flex align-items-center position-relative">
        <i class="bi bi-search position-absolute ms-5"></i>
        <input type="text" class="form-control form-control-solid w-250px ps-12" placeholder="Search User" />
      </div>
    </div>

    <div class="card-toolbar">
      <div class="d-flex justify-content-end">
        <button type="button" class="btn btn-light-primary me-3">
          <i class="bi bi-filter"></i> Filter
        </button>

        <button type="button" class="btn btn-light-primary me-3">
          <i class="bi bi-box-arrow-up"></i> Export
        </button>

        <button type="button" class="btn btn-primary" (click)="createModal.show()">
          <i class="bi bi-plus-square-fill"></i> New User
        </button>
      </div>
    </div>
  </div>

  <div class="card-body pt-0">
    <app-datatable
      [columns]="columns"
      [checkboxEnabled]="true"
      [actionsTemplate]="actionsTemplate"
      [data]="datatableSignal().items"
      [currentPage]="datatableSignal().currentPage"
      [totalPages]="datatableSignal().totalPages">
    </app-datatable>
  </div>
</div>

<ng-template #actionsTemplate let-item>
  <button class="btn btn-icon btn-light btn-active-light-primary w-30px h-30px me-3"
    (click)="onEdit(item, updateModal)">
    <i class="fs-6 bi bi-sliders2-vertical"></i>
  </button>
  <button class="btn btn-icon btn-light btn-active-light-primary w-30px h-30px" (click)="onDelete(item)">
    <i class="fs-6 bi bi-x-octagon"></i>
  </button>
</ng-template>

<div class="modal fade" bsModal #createModal="bs-modal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h4 id="create-user-modal-title" class="modal-title pull-left">Create New User</h4>
        <button type="button" class="btn-close close pull-right" (click)="createModal.hide()">
          <span aria-hidden="true" class="visually-hidden">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form [formGroup]="createForm">
          <div class="fv-row fv-plugins-icon-container mb-4">
            <label class="d-flex align-items-center fs-5 fw-semibold mb-2">
              <span class="required">First Name</span>
            </label>
            <input type="text" class="form-control form-control-lg form-control-solid" formControlName="firstName"
              [class.is-invalid]="createForm.get('firstName')?.invalid && createForm.get('firstName')?.touched" />
            <div class="invalid-feedback"
              *ngIf="createForm.get('firstName')?.invalid && createForm.get('firstName')?.touched">
              <span *ngIf="createForm.get('firstName')?.errors?.['required']">First name is required</span>
              <span *ngIf="createForm.get('firstName')?.errors?.['minlength']">First name must be at least 3 characters</span>
            </div>
          </div>
          <div class="fv-row fv-plugins-icon-container">
            <label class="d-flex align-items-center fs-5 fw-semibold mb-2">
              <span class="required">Last Name</span>
            </label>
            <input type="text" class="form-control form-control-lg form-control-solid" formControlName="lastName"
              [class.is-invalid]="createForm.get('lastName')?.invalid && createForm.get('lastName')?.touched" />
            <div class="invalid-feedback"
              *ngIf="createForm.get('lastName')?.invalid && createForm.get('lastName')?.touched">
              <span *ngIf="createForm.get('lastName')?.errors?.['required']">Last name is required</span>
              <span *ngIf="createForm.get('lastName')?.errors?.['minlength']">Last name must be at least 3 characters</span>
            </div>
          </div>
        </form>
        <div class="text-center pt-10">
          <button type="reset" class="btn btn-light me-3" (click)="createForm.reset(); createModal.hide()">
            Discard
          </button>
          <button type="submit" class="btn btn-primary" [attr.data-ui-indicator]="isLoadingSignal() ? 'on' : 'off'"
            [disabled]="isLoadingSignal() || createForm.invalid" (click)="onCreate(createModal)">
            <span class="indicator-label">Submit</span>
            <span class="indicator-progress">
              Please wait... <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" bsModal #updateModal="bs-modal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h4 id="update-user-modal-title" class="modal-title pull-left">Update User</h4>
        <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="updateModal.hide()">
          <span aria-hidden="true" class="visually-hidden">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form [formGroup]="updateForm">
          <div class="fv-row fv-plugins-icon-container mb-4">
            <label class="d-flex align-items-center fs-5 fw-semibold mb-2">
              <span class="required">First Name</span>
            </label>
            <input type="text" class="form-control form-control-lg form-control-solid" formControlName="firstName"
              [class.is-invalid]="updateForm.get('firstName')?.invalid && updateForm.get('firstName')?.touched" />
            <div class="invalid-feedback"
              *ngIf="updateForm.get('firstName')?.invalid && updateForm.get('firstName')?.touched">
              <span *ngIf="updateForm.get('firstName')?.errors?.['required']">First name is required</span>
              <span *ngIf="updateForm.get('firstName')?.errors?.['minlength']">First name must be at least 3 characters</span>
            </div>
          </div>
          <div class="fv-row fv-plugins-icon-container">
            <label class="d-flex align-items-center fs-5 fw-semibold mb-2">
              <span class="required">Last Name</span>
            </label>
            <input type="text" class="form-control form-control-lg form-control-solid" formControlName="lastName"
              [class.is-invalid]="updateForm.get('lastName')?.invalid && updateForm.get('lastName')?.touched" />
            <div class="invalid-feedback"
              *ngIf="updateForm.get('lastName')?.invalid && updateForm.get('lastName')?.touched">
              <span *ngIf="updateForm.get('lastName')?.errors?.['required']">Last name is required</span>
              <span *ngIf="updateForm.get('lastName')?.errors?.['minlength']">Last name must be at least 3 characters</span>
            </div>
          </div>
        </form>
        <div class="text-center pt-10">
          <button type="reset" class="btn btn-light me-3" (click)="updateForm.reset(); updateModal.hide()">
            Discard
          </button>
          <button type="submit" class="btn btn-primary" [attr.data-ui-indicator]="isLoadingSignal() ? 'on' : 'off'"
            [disabled]="isLoadingSignal() || updateForm.invalid" (click)="onUpdate(updateModal)">
            <span class="indicator-label">Submit</span>
            <span class="indicator-progress">
              Please wait... <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
