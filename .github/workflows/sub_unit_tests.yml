on:
  workflow_call:
  
permissions:
  contents: read

jobs:

  backend_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: 9.0.x
      - name: Trust HTTPS development certificate
        run: dotnet dev-certs https --trust
        env:
          WSL_INTEROP: "" # https://github.com/dotnet/aspnetcore/issues/65391
      - name: Build Backend
        run: dotnet build datntdev.Microservice.slnf
      - name: Run unit tests - Gateway
        working-directory: tests/Infra.Gateway
        run: dotnet test --no-build
      - name: Run unit tests - Srv.Admin
        working-directory: tests/Srv.Admin
        run: dotnet test --no-build
      - name: Run unit tests - Srv.Identity
        working-directory: tests/Srv.Identity
        run: dotnet test --no-build
      - name: Run unit tests - Srv.Notify
        working-directory: tests/Srv.Notify
        run: dotnet test --no-build
      - name: Run unit tests - Srv.Payment
        working-directory: tests/Srv.Payment
        run: dotnet test --no-build

  frontend_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: srcs/apps/Angular/package-lock.json
      - name: Install dependencies
        working-directory: srcs/apps/Angular
        run: npm install
      - name: Run unit tests
        working-directory: srcs/apps/Angular
        run: npm test -- --watch=false
